name: Build and Upload

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Setup Python 3.9 (64-bit)
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          architecture: x64
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r emulator/requirements.txt
          python -m pip install -r emulator/py39_tools/billysb_blob_manager/requirements.txt
          python -m pip install -r emulator/py39_tools/user_tool/requirements.txt
          python -m pip install pyinstaller sqlalchemy pymysql

      - name: Build Emulator
        working-directory: emulator
        run: python -m PyInstaller -F -i source-content.ico emulator.py --add-data "steam3/protobufs;steam3/protobufs" --add-data "files/icons/*.ico;files/icons/" --hidden-import tkinter --paths .

      - name: Build Blob Manager
        working-directory: emulator/py39_tools/billysb_blob_manager
        run: python -m PyInstaller --noconsole -F -i icon.ico --hidden-import=difflib --hidden-import=configparser --hidden-import=queue --hidden-import=itertools --hidden-import=webbrowser --hidden-import=urllib.request --hidden-import=urllib.error --hidden-import=urllib.parse --hidden-import=json --hidden-import=pydoc --hidden-import=ctypes --hidden-import=platform --add-data "resources;resources" blobmgr.py

      - name: Build User Tool
        working-directory: emulator/py39_tools/user_tool
        run: python -m PyInstaller -F -i ../../source-content.ico User_tool.py --add-data "base_dbdriver.py;." --hidden-import=sqlalchemy --hidden-import=pymysql --hidden-import=windows_curses --paths .

      - name: Build Remote Admin Tool
        working-directory: emulator/py39_tools/user_tool
        run: python -m PyInstaller -F -i ../../source-content.ico remote_admintool.py --add-data "networking.py;." --add-data "local_utils.py;." --add-data "user_config.py;." --add-data "consolegui_utils.py;." --hidden-import=windows_curses --hidden-import=curses --paths .

      - name: Collect artifacts
        run: |
          mkdir release
          copy emulator\dist\emulator.exe release\
          copy emulator\py39_tools\billysb_blob_manager\dist\blobmgr.exe release\
          copy emulator\py39_tools\user_tool\dist\User_tool.exe release\
          copy emulator\py39_tools\user_tool\dist\remote_admintool.exe release\

      - name: Upload STMServerEmu artifact
        uses: actions/upload-artifact@v6
        with:
          name: STMServerEmu
          path: release\
